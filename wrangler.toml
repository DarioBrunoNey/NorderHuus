# Cloudflare Workers Static Assets – NorderHuus
# Reine Statik-Auslieferung aus dem Ordner "out".
name = "norderhuus"
compatibility_date = "2025-01-01"

[assets]
directory = "./out"
# Standardverhalten (auto). Ohne trailingSlash in Next.js gibt es keine
# Slash-Konflikte mit den /_next/static-Dateien -> CSS/JS laden zuverlässig.
not_found_handling = "404-page"
